{% include "head.html" %}
<h1>Mappa rischio elateridi</h1>
    </div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/model/">Vai al modello</a>
      <a class="nav-link" href="/">Vai alla dashboard</a>
    </nav>
  </header>
  <main class="container">
    <section class="panel map-panel">
      <div class="panel-head">
        <div>
          <h2>Situazione attuale</h2>
          <p class="panel-subtitle">Vista geografica del rischio calcolato sul punto monitorato.</p>
        </div>
      </div>

      <div class="status-grid">
        <div class="status-card">
          <span class="label">Rischio</span>
          <strong class="value risk-{{ risk.color }}">{{ risk.level|upper }}</strong>
        </div>
        <div class="status-card">
          <span class="label">Gradi Giorno</span>
          <strong class="value">{{ current_dd }}</strong>
        </div>
        <div class="status-card">
          <span class="label">Azione</span>
          <strong class="value">{{ risk.action }}</strong>
        </div>
        <div class="status-card">
          <span class="label">Soglia Sordidus</span>
          <strong class="value">{{ threshold }}</strong>
        </div>
      </div>

      <!--
        I dati calcolati server-side vengono passati al JS esterno (map.js)
        tramite attributi data-*, non tramite tag Django dentro il .js:
        i file statici non passano dal motore template.
      -->
      <div
        id="map"
        data-risk-level="{{ risk.level|escapejs }}"
        data-risk-color="{{ risk.color|escapejs }}"
        data-risk-action="{{ risk.action|escapejs }}"
        data-current-dd="{{ current_dd|escapejs }}"
        data-threshold="{{ threshold|escapejs }}"
        data-pin-lat="{{ pin_lat|escapejs }}"
        data-pin-lng="{{ pin_lng|escapejs }}"
      ></div>
    </section>
  </main>

  <script src="/static/js/map.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap&loading=async"></script>
</body>
</html>
