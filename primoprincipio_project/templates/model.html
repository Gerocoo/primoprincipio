{% include "head.html" %}
     <h1>Modello Gradi Giorno</h1>
    </div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/map/">Vai alla mappa</a>
      <a class="nav-link" href="/">Vai alla dashboard</a>
    </nav>
  </header>

  <main class="container two-cols">
    <section class="panel wide">
      <div id="chart"></div>
    </section>

    <section class="panel">
      <h2>Gestione soglie</h2>

      <form id="alert-form">
        <label>Soglia <input type="number" step="0.1" name="threshold" required></label>
        <label>Email <input type="email" name="email" required></label>
        <button type="submit">Salva soglia</button>
      </form>

      <div class="risk-box risk-{{ risk.color }}">
        <p><strong>Rischio:</strong> {{ risk.level|upper }}</p>
        <p><strong>Azione:</strong> {{ risk.action }}</p>
        <p><strong>Soglia Sordidus:</strong> {{ threshold }}</p>
      </div>

      <h3>Soglie salvate</h3>
      <div id="alerts-list"></div>
    </section>
  </main>

  {{ degree_days|json_script:"degree-days-data" }}

  <!--
    Contenitore "muto" usato solo per passare la soglia al JS esterno
    (model.js) tramite data-*, seguendo lo stesso principio già usato
    sopra con json_script per i Gradi Giorno.
  -->
  <div id="model-config" data-threshold="{{ threshold|escapejs }}" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/highcharts@12.4.0/highcharts.js"></script>
  <script src="/static/js/model.js"></script>
</body>
</html>
