{% include "head.html" %}
<h1>Dashboard</h1>
</div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/model/">Vai al modello</a>
      <a class="nav-link" href="/map/">Vai alla mappa</a>
    </nav>
  </header>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --border: #d8d6cf;
            --text: #222;
            --muted: #666;
            --primary: #0f766e;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        h1, h2, h3 { margin-top: 0; }
        .page {
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .run-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 70vh;
            overflow: auto;
        }

        .run-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            background: #fff;
        }

        .run-item:hover,
        .run-item.active {
            border-color: var(--primary);
            background: #eef8f6;
        }

        .muted {
            color: var(--muted);
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .stat .label {
            font-size: 13px;
            color: var(--muted);
        }

        .stat .value {
            font-size: 22px;
            font-weight: bold;
            margin-top: 6px;
        }

        .chart-wrap {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="page">
    
    <p class="muted">Visualizzazione dei run salvati e delle serie temporali X per evento.</p>

    <div class="grid">
        <div class="card">
            <h2>Run disponibili</h2>
            <div id="runList" class="run-list"></div>
        </div>

        <div>
            <div class="stats" id="stats"></div>

            <div class="card chart-wrap">
                <h2>Serie temporali X per evento</h2>
                <canvas id="eventsChart" height="120"></canvas>
            </div>

            <div class="card chart-wrap">
                <h2>Riepilogo giornaliero</h2>
                <canvas id="summaryChart" height="100"></canvas>
            </div>

            <div class="card">
                <h2>Snapshot</h2>
                <table>
                    <thead>
                        <tr>
                            <th>DOY</th>
                            <th>Event index</th>
                            <th>X</th>
                        </tr>
                    </thead>
                    <tbody id="snapshotTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let eventsChart = null;
let summaryChart = null;
let activeRunId = null;

const palette = [
    "#0f766e", "#2563eb", "#dc2626", "#7c3aed",
    "#ea580c", "#16a34a", "#db2777", "#0891b2"
];

async function fetchRuns() {
    const response = await fetch("/api/runs/");
    if (!response.ok) throw new Error("Errore nel caricamento dei run");
    return await response.json();
}

async function fetchRunDetail(runId) {
    const response = await fetch(`/api/runs/${runId}/`);
    if (!response.ok) throw new Error("Errore nel caricamento del dettaglio run");
    return await response.json();
}

function renderRunList(runs) {
    const container = document.getElementById("runList");
    container.innerHTML = "";

    runs.forEach((run, index) => {
        const item = document.createElement("div");
        item.className = "run-item";
        item.dataset.runId = run.id;
        item.innerHTML = `
            <strong>Run #${run.id}</strong><br>
            <span class="muted">DOY ${run.first_doy} - ${run.last_doy}</span><br>
            <span class="muted">Snapshot: ${run.snapshot_count}</span>
        `;

        item.addEventListener("click", async () => {
            document.querySelectorAll(".run-item").forEach(el => el.classList.remove("active"));
            item.classList.add("active");
            activeRunId = run.id;
            const detail = await fetchRunDetail(run.id);
            renderRunDetail(detail);
        });

        container.appendChild(item);

        if (index === 0) {
            item.classList.add("active");
            activeRunId = run.id;
        }
    });
}

function renderStats(detail) {
    const run = detail.run;
    const snapshots = detail.snapshots;
    const eventCount = detail.event_series.length;
    const daysCount = detail.summary_by_day.length;

    const matured = snapshots.filter(s => Number(s.x_value) >= 1).length;

    document.getElementById("stats").innerHTML = `
        <div class="stat">
            <div class="label">Run ID</div>
            <div class="value">${run.id}</div>
        </div>
        <div class="stat">
            <div class="label">Intervallo DOY</div>
            <div class="value">${run.first_doy}-${run.last_doy}</div>
        </div>
        <div class="stat">
            <div class="label">Eventi distinti</div>
            <div class="value">${eventCount}</div>
        </div>
        <div class="stat">
            <div class="label">Snapshot salvati</div>
            <div class="value">${snapshots.length}</div>
        </div>
    `;
}

function renderEventsChart(detail) {
    const labels = detail.summary_by_day.map(row => row.doy);

    const datasets = detail.event_series.map((series, i) => ({
        label: `Evento ${series.event_index}`,
        data: series.points.map(p => p.x_value),
        borderColor: palette[i % palette.length],
        backgroundColor: palette[i % palette.length],
        borderWidth: 2,
        spanGaps: false,
        tension: 0.25
    }));

    if (eventsChart) eventsChart.destroy();

    const ctx = document.getElementById("eventsChart").getContext("2d");
    eventsChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { mode: "nearest", intersect: false },
            scales: {
                y: {
                    min: 0,
                    max: 1,
                    title: { display: true, text: "X" }
                },
                x: {
                    title: { display: true, text: "DOY" }
                }
            }
        }
    });
}

function renderSummaryChart(detail) {
    const labels = detail.summary_by_day.map(row => row.doy);

    const datasets = [
        {
            label: "Eventi attivi",
            data: detail.summary_by_day.map(row => row.active_events),
            borderColor: "#2563eb",
            backgroundColor: "#2563eb",
            borderWidth: 2,
            tension: 0.25,
            yAxisID: "y"
        },
        {
            label: "X medio",
            data: detail.summary_by_day.map(row => row.mean_x),
            borderColor: "#dc2626",
            backgroundColor: "#dc2626",
            borderWidth: 2,
            tension: 0.25,
            yAxisID: "y1"
        }
    ];

    if (summaryChart) summaryChart.destroy();

    const ctx = document.getElementById("summaryChart").getContext("2d");
    summaryChart = new Chart(ctx, {
        type: "line",
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { mode: "nearest", intersect: false },
            scales: {
                y: {
                    beginAtZero: true,
                    position: "left",
                    title: { display: true, text: "Eventi attivi" }
                },
                y1: {
                    beginAtZero: true,
                    max: 1,
                    position: "right",
                    grid: { drawOnChartArea: false },
                    title: { display: true, text: "X medio" }
                }
            }
        }
    });
}

function renderSnapshotTable(detail) {
    const body = document.getElementById("snapshotTable");
    body.innerHTML = "";

    detail.snapshots.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.doy}</td>
            <td>${row.event_index}</td>
            <td>${Number(row.x_value).toFixed(4)}</td>
        `;
        body.appendChild(tr);
    });
}

function renderRunDetail(detail) {
    renderStats(detail);
    renderEventsChart(detail);
    renderSummaryChart(detail);
    renderSnapshotTable(detail);
}

async function initDashboard() {
    try {
        const runs = await fetchRuns();
        renderRunList(runs);

        if (runs.length > 0) {
            const detail = await fetchRunDetail(runs[0].id);
            renderRunDetail(detail);
        } else {
            document.getElementById("runList").innerHTML = "<p class='muted'>Nessun run disponibile.</p>";
        }
    } catch (error) {
        document.getElementById("runList").innerHTML = `<p class='muted'>${error.message}</p>`;
    }
}

initDashboard();
</script>
</body>
</html>
