{% include "head.html" %}
<h1>Dashboard</h1>
</div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/model/">Vai al modello</a>
      <a class="nav-link" href="/map/">Vai alla mappa</a>
    </nav>
  </header>
  <link rel="stylesheet" href="/static/css/dashboard.css" />

  <div class="page dashboard-page">
    <p class="muted">Visualizzazione dei run salvati e delle serie temporali X per evento.</p>

    <div class="grid">
        <div class="card">
            <h2>Run disponibili</h2>
            <div id="runList" class="run-list"></div>
        </div>

        <div>
            <div class="stats" id="stats"></div>

            <div class="card chart-wrap">
                <h2>Serie temporali X per evento</h2>
                <canvas id="eventsChart" height="120"></canvas>
            </div>

            <div class="card chart-wrap">
                <h2>Riepilogo giornaliero</h2>
                <canvas id="summaryChart" height="100"></canvas>
            </div>

            <div class="card">
                <h2>Snapshot</h2>
                <table>
                    <thead>
                        <tr>
                            <th>DOY</th>
                            <th>Event index</th>
                            <th>X</th>
                        </tr>
                    </thead>
                    <tbody id="snapshotTable"></tbody>
                </table>
            </div>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
