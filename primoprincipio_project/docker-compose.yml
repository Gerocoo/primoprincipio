version: "3.9"

services:
  db:
    image: postgres:15
    container_name: primoprincipio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: primoprincipio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: primoprincipio_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: postgres
      POSTGRES_DB: primoprincipio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      EMAIL_HOST: sandbox.smtp.mailtrap.io
      EMAIL_PORT: 2525
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      EMAIL_USE_TLS: "1"
      DEFAULT_FROM_EMAIL: assistenza@primoprincipio.it
      GOOGLE_MAPS_API_KEY: ""
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: